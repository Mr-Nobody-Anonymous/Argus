system:
  fps_target: 10
  max_cameras: 100
  snapshot_retention_days: 30
  log_level: INFO
  snapshot_dir: data/snapshots

# Cross-Camera Tracking Configuration
cross_camera_tracker:
  enabled: true
  similarity_threshold: 0.5
  max_track_age_hours: 24
  max_path_points: 100
  enable_trajectory_prediction: true

inference:
  model: yolov8n.pt
  confidence_threshold: 0.5
  device: cpu
  classes: []  # Empty = detect all classes (person, car, animals, etc.)

# Image Enhancement Configuration
enhancement:
  enabled: true
  auto_enhance: true
  low_light_enhancement: true
  denoise: true
  sharpen: true
  night_vision: false
  deblur: true
  hdr: false

# Face Recognition Configuration
face_recognition:
  enabled: true  # Set to true to enable face detection/recognition
  confidence_threshold: 0.6
  model_path: models/face_recognition
  max_faces_per_frame: 10

# Speed Analysis Configuration
speed_analysis:
  enabled: true
  calibration_factor: 0.05  # meters per pixel at reference distance
  reference_distance_m: 10.0

# Height Analysis Configuration
height_analysis:
  enabled: true
  avg_person_height_m: 1.7

mqtt:
  enabled: true
  broker: localhost
  port: 1883
  topic_prefix: argus
  qos: 1

database:
  url: sqlite:///data/argus.db

# Example camera configurations (can be managed via API)
cameras: []

# License Plate Recognition Configuration
license_plate:
  enabled: true
  region: us  # us, eu, uk
  min_confidence: 0.6

# Anomaly Detection Configuration
anomaly:
  enabled: true
  sensitivity: 0.7
  window_size: 100

# Person Re-identification Configuration
reid:
  enabled: false
  similarity_threshold: 0.7
  feature_dim: 2048

# ── Consortium Attention Board Configuration ──
consortium:
  enabled: true
  sync_interval_ms: 100
  resource_bidding_enabled: true
  max_agents: 8
  bidding_strategy: proportional

# ── Real-Time Hardware Telemetry ──
telemetry:
  enabled: true
  sampling_interval_ms: 500
  cache_ttl_seconds: 1.0
  thresholds:
    cpu_warning: 0.80
    cpu_critical: 0.95
    gpu_warning: 0.75
    gpu_critical: 0.90
    ram_warning: 0.80
    ram_critical: 0.95
    vram_warning: 0.80
    vram_critical: 0.95
  stress_multiplier:
    min: 0.3
    max: 1.0
    curve_exponent: 2.0

# ── User Interaction & Viewport Attention Matrix ──
user_attention:
  enabled: true
  active_view_multiplier: 1.5
  click_interaction_boost: 2.0
  expanded_view_multiplier: 2.0
  click_boost_duration_s: 60
  decay_rate_seconds: 30
  viewport_poll_interval_s: 5
  unattended_camera_multiplier: 0.3

# ── Self-Referential Logic Mutation Engine ──
logic_mutation:
  enabled: true
  max_code_line_length: 15
  stability_threshold: 0.10
  max_variants: 20
  test_frame_count: 100
  allowed_builtin_overrides:
    - abs
    - min
    - max
    - round
    - sum
    - len
    - any
    - all
    - sorted
    - filter
    - map
  allowed_imports:
    - math
  sandbox_timeout_ms: 50

# ── Byzantine Fault-Tolerant State Recovery Manager ──
state_recovery:
  enabled: true
  heartbeat_timeout_ms: 2000
  max_allowed_consecutive_errors: 10
  ledger_history_limit: 5
  watchdog_poll_interval_ms: 500
  auto_rollback_enabled: true
  log_recovery_events: true

# ── YOLO Detection Agent ──
yolo_agent:
  enabled: true
  local_evolution:
    enabled: true
    evaluation_window: 1000
    mutation_rate: 0.1
  gene_vector_bounds:
    yolo_conf_threshold: [0.1, 0.9]
    iou_threshold: [0.1, 0.9]
    input_resolution_scale: [0.5, 1.0]
    tracker_matching_threshold: [0.4, 0.9]
  compute_cost_per_frame: 15.0

# ── Face Recognition Agent ──
face_agent:
  enabled: true
  local_evolution:
    enabled: true
    evaluation_window: 500
    mutation_rate: 0.12
  gene_vector_bounds:
    match_distance_threshold: [0.3, 0.9]
    min_face_size_px: [30, 100]
    track_timeout_seconds: [1.0, 10.0]
    frame_skip_cadence: [1, 10]
  compute_cost_per_frame: 8.5

# ── License Plate Recognition Agent ──
lpr_agent:
  enabled: true
  local_evolution:
    enabled: true
    evaluation_window: 500
    mutation_rate: 0.12
  gene_vector_bounds:
    segmentation_threshold: [0.3, 0.8]
    min_plate_height_px: [15, 50]
    resolution_downscale: [0.5, 1.0]
    detection_confidence: [0.4, 0.9]
    ocr_beam_width: [1, 5]
  compute_cost_per_frame: 12.0

# Generative-Evolutionary Cognition Engine Configuration
evolutionary_engine:
  enabled: true

  # Generative Synthesizer params
  synthesizer:
    enabled: true
    context_window: 50
    min_generation_interval_s: 60
    max_generated_rules: 20

  # Evolutionary Evaluator params
  evaluator:
    enabled: true
    evaluation_window: 1000
    fitness_weights:
      inference_speed: 0.3
      tracking_accuracy: 0.25
      false_positive_ratio: 0.2
      kafka_latency_ms: 0.1
      rule_precision: 0.15
    survival_threshold: 0.4

  # Mutation Orchestrator params
  mutation:
    enabled: true
    initial_mutation_rate: 0.1
    adaptive_rate: true
    max_mutation_attempts: 3
    population_cap: 50
    prune_interval_s: 300
    crossover_rate: 0.3
    # Dynamic Optimization Vector bounds
    vector_bounds:
      yolo_conf_threshold: [0.1, 0.9]
      iou_threshold: [0.1, 0.9]
      tracking_history_buffer: [5, 100]
      frame_skipping_cadence: [1, 5]
      rules_engine_cooldown: [0.5, 10.0]


# Deep Tracker Configuration
tracker:
  enabled: true
  algorithm: bytetrack  # deepsort, botsort, bytetrack
  track_buffer: 30
  match_threshold: 0.6

# Pose Estimation Configuration
pose:
  enabled: true
  min_detection_confidence: 0.5
  min_tracking_confidence: 0.5

# Qdrant Vector Database Configuration
qdrant:
  enabled: true
  host: localhost
  port: 6333

# Kafka Configuration
kafka:
  enabled: false
  host: localhost
  port: 9092

# Rule configurations
rules:
  intrusion:
    enabled: true
    priority: high
    description: "Person/vehicle enters restricted zone"
  loitering:
    enabled: true
    threshold_seconds: 30
    priority: medium
    description: "Person remains in zone > 30 seconds"
  speed_violation:
    enabled: true
    threshold_kmh: 30
    priority: high
    description: "Vehicle exceeds speed threshold"
  fall_detection:
    enabled: true
    priority: high
    description: "Person fall detected via pose estimation"
  abandoned_object:
    enabled: true
    threshold_seconds: 60
    priority: medium
    description: "Stationary object detected"